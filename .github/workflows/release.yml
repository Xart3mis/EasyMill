name: Release

on:
  push:
    tags:
      - 'v*'

env:
  EASYMILL_RELEASE: ${{ github.ref_name }}

jobs:
  release:
    name: Build and Release
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: easymill-${{ matrix.os }}
          path: ${{ matrix.os == 'windows-latest' && 'target/release/easymill.exe' || 'target/release/easymill' }}

  create-release:
    name: Create Release
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            easymill-ubuntu-latest/easymill
            easymill-windows-latest/easymill.exe
          generate_release_notes: true
